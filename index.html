<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mawa Hotel Bamenda | Luxury & Comfort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <nav>
            <div class="logo">Mawa<span>Hotel</span></div>
        </nav>
        <div class="hero-content">
            <h1>Experience Bamenda in Luxury</h1>
            <p>Comfortable rooms, exquisite dining, and the best view in Nkwen.</p>
            <div class="cta-buttons">
                <a href="https://wa.me/237674381734?text=I'd%20like%20to%20book%20a%20room" class="btn-whatsapp">Book on WhatsApp</a>
                <a href="#contact" class="btn-outline">Contact Us</a>
            </div>
        </div>
    </header>

    <section id="contact" class="contact-section">
        <h2>Reserve Your Stay</h2>
        <form action="https://formsubmit.co/abongprecious41@gmail.com" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <select name="room_type">
                <option value="standard">Standard Room</option>
                <option value="luxury">Luxury Suite</option>
            </select>
            <button type="submit">Send Inquiry</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Mawa Hotel Bamenda. Designed by CATUC SWE Dept.</p>
    </footer>
</body>
</html>
